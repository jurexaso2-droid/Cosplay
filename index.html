<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosplay Shoti - Scroll</title>
    <style>
        :root {
            --tiktok-red: #ff2c55;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden; /* Prevent body scroll */
        }

        /* The Scroll Container */
        #video-feed {
            height: 100vh;
            width: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* This enables the "snap" effect */
            scroll-behavior: smooth;
        }

        /* Hide Scrollbar */
        #video-feed::-webkit-scrollbar { display: none; }

        /* Each Video Card */
        .video-card {
            position: relative;
            width: 100%;
            height: 100vh;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            bottom: 40px;
            left: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .username { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .description { font-size: 0.9rem; opacity: 0.8; }

        /* Floating Sound Button */
        .sound-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.4);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 20;
        }

        /* Loading Indicator */
        #global-loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #333;
            border-top: 4px solid var(--tiktok-red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
        <p>Loading Videos...</p>
    </div>

    <button class="sound-toggle" onclick="toggleGlobalMute()" id="muteBtn">🔇</button>

    <div id="video-feed">
        <!-- Videos will be injected here -->
    </div>

    <script>
        const feed = document.getElementById('video-feed');
        const loader = document.getElementById('global-loader');
        const muteBtn = document.getElementById('muteBtn');
        
        let isMuted = true;
        let videoList = [];

        // 1. Fetch the list of videos from GitHub
        async function initFeed() {
            try {
                const response = await fetch("https://api.github.com/repos/ajirodesu/cosplay/contents/");
                const files = await response.json();
                
                // Filter and shuffle the list
                videoList = files
                    .filter(file => file.name.endsWith('.mp4'))
                    .sort(() => Math.random() - 0.5);

                // Add the first 5 videos immediately
                for(let i=0; i < 5; i++) {
                    addVideoCard(videoList[i]);
                }

                loader.style.display = 'none';
                setupObserver();
            } catch (err) {
                alert("Error loading archive");
            }
        }

        // 2. Create a video card element
        function addVideoCard(fileData) {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <video src="${fileData.download_url}" loop playsinline ${isMuted ? 'muted' : ''}></video>
                <div class="overlay">
                    <div class="username">@ajirodesu</div>
                    <div class="description">👗 ${fileData.name}</div>
                </div>
            `;
            feed.appendChild(card);
        }

        // 3. Play/Pause logic when scrolling
        function setupObserver() {
            const options = { threshold: 0.6 }; // Play when 60% of video is visible
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        
                        // Load more videos when we get near the end
                        if (entry.target === feed.lastElementChild) {
                            loadMore();
                        }
                    } else {
                        video.pause();
                        video.currentTime = 0; // Reset video when off screen
                    }
                });
            }, options);

            // Observe existing cards
            document.querySelectorAll('.video-card').forEach(card => observer.observe(card));

            // Logic to observe new cards added later
            const mutationObserver = new MutationObserver((mutations) => {
                mutations.forEach(mutation => {
                    mutation.addedNodes.forEach(node => {
                        if (node.classList?.contains('video-card')) observer.observe(node);
                    });
                });
            });
            mutationObserver.observe(feed, { childList: true });
        }

        function loadMore() {
            const currentCount = feed.children.length;
            for(let i = currentCount; i < currentCount + 3; i++) {
                if(videoList[i]) addVideoCard(videoList[i]);
            }
        }

        function toggleGlobalMute() {
            isMuted = !isMuted;
            const allVideos = document.querySelectorAll('video');
            allVideos.forEach(v => v.muted = isMuted);
            muteBtn.innerText = isMuted ? "🔇" : "🔊";
        }

        // Start
        initFeed();
    </script>
</body>
</html>
